<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quizz Wiwi - Révisions Médecine</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="header">
    <h1>Quizz Wiwi</h1>
    <p>Révise tes annales de médecine</p>
  </div>

  <div class="container">

    <!-- HOME -->
    <div id="screen-home" class="screen active">
      <div class="home-actions">
        <button class="home-progression-btn" onclick="showProgression()">📈 Ma progression</button>
      </div>

      <div class="search-box">
        <input type="text" id="search-input" class="search-input" placeholder="🔍 Rechercher une fiche, un cours ou un mot-clé..." oninput="onSearch()" autocomplete="off">
        <button class="search-clear" id="search-clear" onclick="clearSearch()" style="display:none;">✕</button>
      </div>
      <div id="search-results" class="search-results"></div>

      <div id="home-content">
        <h2 style="margin-top:1rem; font-size:1.1rem;">Choisis une matière</h2>
        <div id="subject-grid" class="subject-grid"></div>
      </div>
    </div>

    <!-- MODE SELECTION -->
    <div id="screen-mode" class="screen">
      <button class="back-btn" onclick="goHome()">← Retour</button>
      <h2 id="mode-subject-name" style="font-size:1.1rem;"></h2>

      <h3 class="mode-section-title">🔥 Mode examen chronométré</h3>
      <div class="mode-selector timed-modes">
        <button class="mode-btn mode-btn-primary" onclick="startTimedExam()">
          <div class="mode-icon">⏱️</div>
          <div class="mode-label">Examen blanc</div>
          <div class="mode-desc">50 questions · 1 heure</div>
        </button>
        <button class="mode-btn mode-btn-primary" onclick="startFlashExam()">
          <div class="mode-icon">⚡</div>
          <div class="mode-label">Examen flash</div>
          <div class="mode-desc">10 questions · 12 min</div>
        </button>
      </div>

      <h3 class="mode-section-title">📚 Mode entraînement</h3>
      <div class="mode-selector">
        <button class="mode-btn" onclick="showExamList()">
          <div class="mode-icon">📋</div>
          <div class="mode-label">Examen par examen</div>
          <div class="mode-desc">Refais un examen complet</div>
        </button>
        <button class="mode-btn" onclick="startRandom()">
          <div class="mode-icon">🎲</div>
          <div class="mode-label">20 aléatoires</div>
          <div class="mode-desc">Mix de tous les examens</div>
        </button>
        <button class="mode-btn" onclick="showCoursList()">
          <div class="mode-icon">📖</div>
          <div class="mode-label">Par cours</div>
          <div class="mode-desc">Révise un chapitre</div>
        </button>
        <button class="mode-btn" onclick="showFichesList()">
          <div class="mode-icon">📝</div>
          <div class="mode-label">Fiches de cours</div>
          <div class="mode-desc">Résumés à lire</div>
        </button>
      </div>
    </div>

    <!-- COURS LIST -->
    <div id="screen-cours" class="screen">
      <button class="back-btn" onclick="goBackToMode()">← Retour</button>
      <h2 id="cours-subject-name" style="font-size:1.1rem; margin-bottom:1rem;"></h2>
      <div id="cours-list" class="exam-list"></div>
    </div>

    <!-- FICHES LIST -->
    <div id="screen-fiches" class="screen">
      <button class="back-btn" onclick="goBackToMode()">← Retour</button>
      <h2 id="fiches-subject-name" style="font-size:1.1rem; margin-bottom:1rem;"></h2>
      <div id="fiches-list" class="exam-list"></div>
    </div>

    <!-- FICHE VIEW -->
    <div id="screen-fiche-view" class="screen">
      <button class="back-btn" onclick="goBackToFiches()">← Retour aux fiches</button>
      <div class="fiche-header">
        <h1 id="fiche-title"></h1>
        <p id="fiche-prof" class="fiche-prof"></p>
      </div>
      <div id="fiche-content" class="fiche-content"></div>
      <div id="fiche-quiz-links" class="fiche-quiz-links"></div>
    </div>

    <!-- EXAM LIST -->
    <div id="screen-exams" class="screen">
      <button class="back-btn" onclick="goBackToMode()">← Retour</button>
      <h2 id="exam-subject-name" style="font-size:1.1rem; margin-bottom:1rem;"></h2>
      <div id="exam-list" class="exam-list"></div>
    </div>

    <!-- QUIZ -->
    <div id="screen-quiz" class="screen">
      <div class="quiz-top">
        <button class="back-btn" onclick="quitQuiz()">← Quitter</button>
        <div id="timer" class="timer" style="display:none;"></div>
      </div>
      <div class="quiz-exam-name" id="quiz-exam-name"></div>
      <div class="progress-bar"><div class="fill" id="progress-fill"></div></div>
      <div class="question-counter" id="question-counter"></div>
      <div class="question-context" id="question-context" style="display:none;"></div>
      <div class="question-text" id="question-text"></div>
      <div class="options-list" id="options-list"></div>
      <div class="quiz-nav">
        <button class="btn btn-secondary" id="btn-prev" onclick="prevQuestion()" style="display:none;">← Précédent</button>
        <button class="btn btn-primary" id="btn-next" onclick="nextQuestion()">Suivant →</button>
        <button class="btn btn-finish" id="btn-finish" onclick="finishQuiz()" style="display:none;">Terminer & Corriger</button>
      </div>
    </div>

    <!-- RESULTS -->
    <div id="screen-results" class="screen">
      <div class="results-card">
        <div class="score" id="score-pct"></div>
        <div class="score-label" id="score-total"></div>
        <div id="score-time" class="score-time" style="display:none;"></div>
        <div class="stats">
          <div class="stat">
            <div class="stat-value green" id="score-correct"></div>
            <div class="stat-label">Correctes</div>
          </div>
          <div class="stat">
            <div class="stat-value red" id="score-wrong"></div>
            <div class="stat-label">Incorrectes</div>
          </div>
        </div>
        <div class="actions" style="justify-content:center;">
          <button class="btn btn-primary" onclick="restartQuiz()">Recommencer</button>
          <button class="btn btn-secondary" onclick="goHome()">Accueil</button>
        </div>
      </div>

      <div id="analysis-container" class="analysis-container"></div>

      <h3 style="margin:1.5rem 0 1rem; font-size:1rem;">Correction détaillée</h3>
      <div id="correction-review"></div>
    </div>

    <!-- PROGRESSION -->
    <div id="screen-progression" class="screen">
      <button class="back-btn" onclick="goHome()">← Retour</button>
      <h2 style="font-size:1.2rem; margin-bottom:0.5rem;">📈 Ma progression</h2>
      <p style="color:var(--text-light); font-size:0.85rem; margin-bottom:1rem;">Historique de tes examens chronométrés.</p>
      <div id="progression-content"></div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
